services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mcp_hub_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcp_hub_password}
      POSTGRES_DB: ${POSTGRES_DB:-mcp_hub_db}
    ports:
      - "${DB_PORT:-10003}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mcp_hub_user}"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    container_name: mcp-hub-backend-${ENVIRONMENT:-dev}
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: ${BUILD_TARGET:-development}
    env_file:
      - .env
      - .env.${ENVIRONMENT:-dev}
    environment:
      - HTTP_PROXY=xxx
      - HTTPS_PROXY=xxx
      - NO_PROXY=xxx
      - POSTGRES_USER=${POSTGRES_USER:-mcp_hub_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mcp_hub_password}
      - POSTGRES_DB=${POSTGRES_DB:-mcp_hub_db}
      - POSTGRES_PORT=5432
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "${BACKEND_PORT:-10001}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${VOLUME_MOUNT:-./backend:/app}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    container_name: mcp-hub-frontend-${ENVIRONMENT:-dev}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: ${BUILD_TARGET:-development}
    env_file:
      - .env
      - .env.${ENVIRONMENT:-dev}
    environment:
      - HTTP_PROXY=xxx
      - HTTPS_PROXY=xxx
      - NO_PROXY=xxx
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:10001}
    ports:
      - "${FRONTEND_PORT:-10002}:3000"
    depends_on:
      - backend
    volumes:
      - ${VOLUME_MOUNT:-./frontend:/app}
      - /app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 프로덕션 환경에서만 사용되는 Nginx
  nginx:
    image: nginx:alpine
    container_name: mcp-hub-nginx
    profiles:
      - prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local